# ─────────────────────────────────────────────────────────────────────────────
# render.yaml  —  Render.com Infrastructure-as-Code
#
# Deploys:
#   • FastAPI backend   (Web Service — Docker)
#   • React frontend    (Static Site)
#   • PostgreSQL        (Managed Database)
#
# Setup:
#   1. Push repo to GitHub
#   2. Connect repo to Render (render.com → New → Blueprint)
#   3. Set the environment variables marked [SECRET] in the Render dashboard
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: credit-underwriting-db
    databaseName: credit_underwriting
    user: cuuser
    plan: starter          # upgrade to standard or premium for production
    region: oregon         # change to ap-south-1 / ohio / etc. as needed

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  - type: web
    name: credit-underwriting-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter          # starter = 512 MB RAM; upgrade for ML workloads
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: credit-underwriting-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random value

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      - key: STORAGE_BACKEND
        value: s3

      - key: AWS_ACCESS_KEY_ID
        sync: false         # [SECRET] — set in Render dashboard

      - key: AWS_SECRET_ACCESS_KEY
        sync: false         # [SECRET] — set in Render dashboard

      - key: AWS_S3_BUCKET
        value: credit-underwriting-docs

      - key: AWS_S3_REGION
        value: ap-south-1

      - key: OPENAI_API_KEY
        sync: false         # [SECRET] — set in Render dashboard

      - key: PORT
        value: "8000"

    autoDeploy: true

  # ── React frontend (Static Site) ────────────────────────────────────────────
  - type: web
    name: credit-underwriting-ui
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    region: oregon
    # Build-arg: point frontend at the backend service's Render URL
    # Override in Render dashboard after first deploy to get the API URL:
    #   REACT_APP_API_URL = https://credit-underwriting-api.onrender.com
    envVars:
      - key: REACT_APP_API_URL
        value: https://credit-underwriting-api.onrender.com

    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
