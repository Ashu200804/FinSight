# ─────────────────────────────────────────────────────────────────────────────
# nginx/conf.d/app.conf
#
# Replace BOTH occurrences of "yourdomain.com" with your actual domain before
# running:  sed -i 's/yourdomain.com/example.com/g' nginx/conf.d/app.conf
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream services ──────────────────────────────────────────────────────────
upstream backend {
    server backend:8000;
    keepalive 16;
}

upstream frontend {
    server frontend:80;
    keepalive 8;
}

# ── HTTP → HTTPS redirect + Let's Encrypt ACME challenge ──────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # ACME challenge (Certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # Certificates (issued by Certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # HSTS (6 months)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # ── API routes (FastAPI) ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        limit_conn conn_limit 20;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # CORS handled in FastAPI; no duplicate headers here
    }

    # Auth endpoints get stricter rate limiting
    location ~ ^/(api/auth|api/token) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Route all other backend prefixes to FastAPI
    location ~ ^/(documents|ai|extraction|explainability|metrics|credit|cam|research|entities|auth)/ {
        limit_req zone=api burst=40 nodelay;
        limit_conn conn_limit 20;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout 120s;
        # Allow large document uploads
        client_max_body_size 50M;
    }

    # Backend health check (public)
    location = /health {
        proxy_pass http://backend/health;
    }

    # ── React frontend ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}
