# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml  —  LOCAL DEVELOPMENT
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: cu_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: credit_underwriting
      POSTGRES_USER: cuuser
      POSTGRES_PASSWORD: cupassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuuser -d credit_underwriting"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO  (local S3 equivalent) ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: cu_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"         # MinIO Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cu_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://cuuser:cupassword@db:5432/credit_underwriting
      MINIO_URL: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: credit-underwriting
      MINIO_USE_SSL: "false"
      STORAGE_BACKEND: minio
    volumes:
      - ./backend/storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000
    container_name: cu_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
