server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint (used by Docker/load-balancer)
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # React SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"       always;
        add_header X-Content-Type-Options "nosniff"          always;
        add_header X-XSS-Protection       "1; mode=block"    always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

    # Cache static assets aggressively (content-hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript text/xml
               application/xml application/xml+rss image/svg+xml;
}
