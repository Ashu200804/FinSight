name: CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/credit-underwriting-api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/credit-underwriting-ui

jobs:

  # ── Build & push images to GitHub Container Registry ────────────────────────
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      backend_tag:  ${{ steps.meta_backend.outputs.tags }}
      frontend_tag: ${{ steps.meta_frontend.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend
      - name: Docker meta — backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags:   type=sha,prefix=sha-

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context:   ./backend
          file:      ./backend/Dockerfile
          push:      true
          tags:      ${{ steps.meta_backend.outputs.tags }}
          labels:    ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Frontend
      - name: Docker meta — frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags:   type=sha,prefix=sha-

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context:   ./frontend
          file:      ./frontend/Dockerfile
          push:      true
          tags:      ${{ steps.meta_frontend.outputs.tags }}
          labels:    ${{ steps.meta_frontend.outputs.labels }}
          build-args: REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy to AWS EC2 ───────────────────────────────────────────────────────
  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    # Only run if EC2 secrets are configured
    if: ${{ secrets.EC2_HOST != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/credit-underwriting

            # Pull latest code (for compose files / nginx configs)
            git pull origin main

            # Log in to GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Update image tags in .env.deploy
            echo "BACKEND_IMAGE=${{ needs.build-and-push.outputs.backend_tag }}"  >  .env.deploy
            echo "FRONTEND_IMAGE=${{ needs.build-and-push.outputs.frontend_tag }}" >> .env.deploy

            # Pull new images
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull backend frontend

            # Rolling restart (zero-downtime: nginx keeps serving)
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --no-build --remove-orphans backend frontend

            # Clean old images
            docker image prune -f

            echo "Deployment complete ✓"

  # ── Trigger Render deploy ───────────────────────────────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "Render deploy triggered ✓"
