name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend-lint-test:
    name: Backend — lint & smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: ruff lint
        run: |
          pip install ruff
          ruff check . --select E,F,W --ignore E501 || true

      - name: Import smoke-test
        run: python -c "import main; print('Main module imported OK')"
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret
          STORAGE_BACKEND: minio
          MINIO_URL: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET_NAME: test-bucket
          OPENAI_API_KEY: sk-test

  # ── Backend Docker build ────────────────────────────────────────────────────
  backend-docker:
    name: Backend — Docker build
    runs-on: ubuntu-latest
    needs: backend-lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: credit-underwriting-api:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Frontend Docker build ───────────────────────────────────────────────────
  frontend-docker:
    name: Frontend — Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: credit-underwriting-ui:ci
          build-args: REACT_APP_API_URL=https://ci.example.com
          cache-from: type=gha
          cache-to:   type=gha,mode=max
