# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml  —  PRODUCTION OVERRIDE (EC2 / self-hosted)
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from dev:
#   • No bundled MinIO  — uses AWS S3 via env vars
#   • No bundled DB     — uses RDS / managed Postgres via DATABASE_URL env var
#   • nginx reverse-proxy with HTTPS (Let's Encrypt via Certbot)
#   • Backend & frontend do NOT expose ports directly; nginx terminates TLS
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # Remove dev-only services in production
  db:
    profiles: ["dev-only"]   # excluded from default compose up

  minio:
    profiles: ["dev-only"]

  # ── FastAPI backend (production tune) ───────────────────────────────────────
  backend:
    restart: always
    env_file: []             # env vars come from the host / secrets manager
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      STORAGE_BACKEND: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION:-ap-south-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports: []                # no direct port exposure; nginx proxies
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G

  # ── React frontend (production tune) ────────────────────────────────────────
  frontend:
    build:
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-https://api.yourdomain.com}
    ports: []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── nginx reverse proxy + TLS termination ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cu_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  # ── Certbot (one-shot TLS certificate issuer / renewer) ──────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: cu_certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done
      "
    depends_on:
      - nginx

volumes:
  certbot_webroot:
  certbot_certs:
